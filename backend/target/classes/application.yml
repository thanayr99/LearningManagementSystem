server:
  port: 8080

spring:
  application:
    name: iawes-backend
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:iawes_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

app:
  jwt:
    secret: ${JWT_SECRET:change_this_to_a_long_secure_secret_change_this_to_a_long_secure_secret}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  uploads:
    dir: ${UPLOAD_DIR:uploads}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://learning-management-system-pi-three.vercel.app}

management:
  endpoints:
    web:
      exposure:
        include: health,info
